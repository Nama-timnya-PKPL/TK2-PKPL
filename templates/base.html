{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nama timnya PKPL</title>

    <!-- Apply saved theme before CSS loads to prevent flash -->
    <script>
        (function() {
            const saved = JSON.parse(localStorage.getItem("theme"));
            if (!saved) return;
            const root = document.documentElement;
            if (saved.bg)       root.style.setProperty('--bg', saved.bg);
            if (saved.text)     root.style.setProperty('--text', saved.text);
            if (saved.accentHex) root.style.setProperty('--yellow', saved.accentHex);
            if (saved.accentRgb) root.style.setProperty('--theme-rgb', saved.accentRgb);
        })();
    </script>

    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Poppins&family=Space+Grotesk&display=swap" rel="stylesheet">
</head>

<body>

<!-- Apply saved font immediately -->
<script>
    (function() {
        const saved = JSON.parse(localStorage.getItem("theme"));
        if (saved && saved.font) document.body.style.fontFamily = saved.font;
    })();
</script>

<!-- ===================== THEME PANEL ===================== -->
{% if show_theme %}
<div class="theme-toggle" id="themeBtn">🎨</div>

<div class="theme-panel" id="themePanel">
    <div class="theme-header">
        <span class="back-theme" id="closeTheme">←</span>
        <h3>Appearance</h3>
    </div>

    <div class="theme-group">
        <label>Background</label>
        <input type="color" id="bgColor" value="#0c0c0a">
        <div class="preset-colors" data-type="bg">
            <span data-color="#0c0c0a"></span>
            <span data-color="#111827"></span>
            <span data-color="#1f2937"></span>
            <span data-color="#1a1a2e"></span>
            <span data-color="#0f172a"></span>
        </div>
    </div>

    <div class="theme-group">
        <label>Text</label>
        <input type="color" id="textColor" value="#f0ede6">
        <div class="preset-colors" data-type="text">
            <span data-color="#f0ede6"></span>
            <span data-color="#e5e7eb"></span>
            <span data-color="#ffffff"></span>
            <span data-color="#cbd5e1"></span>
        </div>
    </div>

    <div class="theme-group">
        <label>Accent Color</label>
        <input type="color" id="accentColor" value="#e8d40a">
        <div class="preset-colors" data-type="accent">
            <span data-color="#e8d40a"></span>
            <span data-color="#3b82f6"></span>
            <span data-color="#10b981"></span>
            <span data-color="#ef4444"></span>
            <span data-color="#8b5cf6"></span>
        </div>
    </div>

    <div class="theme-group">
        <label>Font Style</label>
        <div class="font-grid">
            <div data-font="'Syne', sans-serif">Syne</div>
            <div data-font="'DM Sans', sans-serif">DM Sans</div>
            <div data-font="'Playfair Display', serif">Playfair</div>
            <div data-font="'Bebas Neue', sans-serif">Bebas</div>
            <div data-font="'Inter', sans-serif">Inter</div>
            <div data-font="'Poppins', sans-serif">Poppins</div>
            <div data-font="'Space Grotesk', sans-serif">Grotesk</div>
        </div>
    </div>

    <button class="reset-btn" id="resetTheme">Reset</button>
</div>
{% endif %}

<!-- ===================== MEMBER MODAL ===================== -->
<div id="memberModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="closeModal">&times;</span>
        <div class="modal-body">
            <div id="modal-role" class="badge">Role</div>
            <img id="modal-img" src="" alt="Foto Profile">
            <h2 id="modal-name">Nama Member</h2>
            <p id="modal-major">Ilmu Komputer</p>
            <p id="modal-desc">Deskripsi singkat tentang member ini.</p>
            <div class="modal-skills" id="modal-skills"></div>
            <div class="modal-npm-box">
                <span class="npm-label">NPM</span>
                <span id="modal-npm-val" class="npm-value">0000000000</span>
            </div>
            <div class="modal-socials">
                <a href="#" target="_blank" id="btn-github" class="social-btn github">GitHub</a>
                <a href="#" target="_blank" id="btn-linkedin" class="social-btn linkedin">LinkedIn</a>
            </div>
        </div>
    </div>
</div>

<!-- ===================== PAGE CONTENT ===================== -->
{% block content %}{% endblock %}

<!-- ===================== CUSTOM CURSOR ===================== -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    /* --- CURSOR --- */
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
        cursor.style.left = mx + 'px';
        cursor.style.top  = my + 'px';
    });

    (function animRing() {
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        ring.style.left = rx + 'px';
        ring.style.top  = ry + 'px';
        requestAnimationFrame(animRing);
    })();

    const hoverTargets = '.card, .btn, .nav-right a, .close-btn, .social-btn, .preset-colors span, .font-grid div';
    document.addEventListener('mouseover', e => {
        if (!e.target.closest(hoverTargets)) return;
        cursor.style.width  = '20px';
        cursor.style.height = '20px';
        cursor.style.background = 'transparent';
        cursor.style.border = '1.5px solid var(--yellow)';
    });
    document.addEventListener('mouseout', e => {
        if (!e.target.closest(hoverTargets)) return;
        cursor.style.width  = '10px';
        cursor.style.height = '10px';
        cursor.style.background = 'var(--yellow)';
        cursor.style.border = 'none';
    });

    /* --- THEME PANEL (only for allowed users) --- */
    {% if show_theme %}
    const themeBtn   = document.getElementById("themeBtn");
    const themePanel = document.getElementById("themePanel");
    const closeTheme = document.getElementById("closeTheme");
    const bgColor    = document.getElementById("bgColor");
    const textColor  = document.getElementById("textColor");
    const accentColor = document.getElementById("accentColor");

    themeBtn.onclick   = () => themePanel.classList.toggle("active");
    closeTheme.onclick = () => themePanel.classList.remove("active");

    function hexToRgb(hex) {
        return [1, 3, 5].map(i => parseInt(hex.slice(i, i + 2), 16)).join(', ');
    }

    function saveTheme() {
        const s = getComputedStyle(document.documentElement);
        localStorage.setItem("theme", JSON.stringify({
            bg:        s.getPropertyValue('--bg').trim(),
            text:      s.getPropertyValue('--text').trim(),
            accentHex: s.getPropertyValue('--yellow').trim(),
            accentRgb: s.getPropertyValue('--theme-rgb').trim(),
            font:      document.body.style.fontFamily
        }));
    }

    function applyAccent(hex) {
        document.documentElement.style.setProperty('--yellow', hex);
        document.documentElement.style.setProperty('--theme-rgb', hexToRgb(hex));
    }

    bgColor.addEventListener("input",    () => { document.documentElement.style.setProperty('--bg', bgColor.value); saveTheme(); });
    textColor.addEventListener("input",  () => { document.documentElement.style.setProperty('--text', textColor.value); saveTheme(); });
    accentColor.addEventListener("input", e  => { applyAccent(e.target.value); saveTheme(); });

    document.querySelectorAll(".preset-colors span").forEach(el => {
        el.style.background = el.dataset.color;
        el.onclick = () => {
            const { type } = el.parentElement.dataset;
            const color = el.dataset.color;
            if (type === "bg")     { document.documentElement.style.setProperty('--bg', color); bgColor.value = color; }
            if (type === "text")   { document.documentElement.style.setProperty('--text', color); textColor.value = color; }
            if (type === "accent") { applyAccent(color); accentColor.value = color; }
            saveTheme();
        };
    });

    document.querySelectorAll(".font-grid div").forEach(el => {
        el.onclick = () => {
            document.body.style.fontFamily = el.dataset.font;
            document.querySelectorAll(".font-grid div").forEach(f => f.classList.remove("active"));
            el.classList.add("active");
            saveTheme();
        };
    });

    // Restore saved theme into panel inputs
    (function restoreTheme() {
        const saved = JSON.parse(localStorage.getItem("theme"));
        if (!saved) return;
        if (saved.bg)       { document.documentElement.style.setProperty('--bg', saved.bg); bgColor.value = saved.bg; }
        if (saved.text)     { document.documentElement.style.setProperty('--text', saved.text); textColor.value = saved.text; }
        if (saved.accentHex && saved.accentRgb) { applyAccent(saved.accentHex); accentColor.value = saved.accentHex; }
        if (saved.font) {
            document.body.style.fontFamily = saved.font;
            document.querySelectorAll(".font-grid div").forEach(el => {
                el.classList.toggle("active", el.dataset.font === saved.font);
            });
        }
    })();

    document.getElementById("resetTheme").onclick = () => {
        localStorage.removeItem("theme");
        location.reload();
    };
    {% endif %}

});
</script>

</body>
</html>
